<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftFlow</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #081224 0%, #0b1a33 100%);
      color: white;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 950px;
      margin: auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 60px 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 64px;
      margin: 0 0 12px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 24px;
      color: #d5deef;
      margin-bottom: 18px;
    }

    .description {
      font-size: 18px;
      color: #bfcbe0;
      max-width: 700px;
      margin: 0 auto 30px;
      line-height: 1.9;
    }

    .support-name {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #ffffff;
      padding: 14px 22px;
      border-radius: 14px;
      font-size: 20px;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 35px;
    }

    .btn {
      display: inline-block;
      padding: 18px 32px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 20px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn-join {
      background: #22c55e;
      color: white;
    }

    .btn-join:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .btn-support {
      background: #0ea5e9;
      color: white;
    }

    .btn-support:hover {
      background: #0284c7;
      transform: translateY(-2px);
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 20px;
    }

    .feature {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 22px 14px;
      color: #e5edf9;
      font-size: 18px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 20px;
      }

      .description {
        font-size: 16px;
      }

      .btn {
        width: 100%;
        max-width: 320px;
      }

      .features {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="container">
      <h1>SwiftFlow</h1>

      <div class="subtitle">منصة احترافية لمتابعة تنبيهات SPX Options</div>

      <p class="description">
        انضم إلى قناة SwiftFlow الخاصة لمتابعة التنبيهات المباشرة، التقارير اليومية،
        وفرص SPX Options بشكل احترافي ومنظم.
      </p>

      <div class="support-name">خدمة عملاء SwiftFlow</div>

      <div class="buttons">
        <a class="btn btn-join" href="https://t.me/subomarbot" target="_blank">
          الاشتراك عبر البوت
        </a>

        <a class="btn btn-support" href="https://t.me/SwiftFlow_Support" target="_blank">
          خدمة العملاء
        </a>
      </div>

      <div class="features">
        <div class="feature">تنبيهات مباشرة</div>
        <div class="feature">تقارير يومية</div>
        <div class="feature">فرص SPX Options</div>
      </div>
    </div>
  </section>

</body>
</html>
