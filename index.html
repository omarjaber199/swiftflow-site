<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftFlow</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1326;
color:white;
text-align:center;
}

.container{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h1{
font-size:60px;
margin-bottom:10px;
}

p{
font-size:22px;
color:#cbd5e1;
margin-bottom:30px;
}

img{
width:140px;
border-radius:100px;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:18px 35px;
font-size:20px;
border-radius:12px;
text-decoration:none;

.btn-join{

.btn-support{

.features{
margin-top:50px;

grid-template-columns:repeat(3,1fr);

}

.feature{

<div class="container">

<img src="https://i.imgur.com/8z3Q9pF.png">

<h1>SwiftFlow</h1>

<p>
منصة احترافية لمتابعة تنبيهات
SPX Options
</p>

<a class="btn btn-join" href="https://t.me/subomarbot">
الاشتراك عبر البوت
</a>

<a class="btn btn-support" href="#">
خدمة عملاء SwiftFlow
</a>

<div class="features">

<div class="feature">
تنبيهات مباشرة
</div>

<div class="feature">
تقارير يومية
</div>

</div>

</div>
